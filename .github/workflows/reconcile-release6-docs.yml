name: Reconcile Release 6 documentation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - docs/release-6-billing-audit

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/release-6-billing-audit
          fetch-depth: 0

      - name: Reconcile canonical documentation
        run: python scripts/reconcile_release6_docs.py

      - name: Commit reconciled documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "STATE — BigSmile.md" \
            README.md \
            AGENTS.md \
            PROJECT_MAP.md \
            docs/product-roadmap.md \
            docs/ux-redesign-reconciliation-and-plan.md \
            docs/patient-intake-and-portal-plan.md \
            docs/decisions/006-patient-intake-and-portal-foundation.md \
            docs/decisions/009-release-6-billing-document-foundation.md \
            docs/release-6-billing-audit-and-closure.md
          git diff --cached --check
          git commit -m "docs: close Release 6 and advance to Release 7"
          git push origin HEAD:docs/release-6-billing-audit
