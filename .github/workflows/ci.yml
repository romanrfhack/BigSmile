name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22.x'

jobs:
  compile_diagnostics:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout document-hardening branch
      uses: actions/checkout@v4
      with:
        ref: release-7.1/document-upload-hardening
        fetch-depth: 1
        show-progress: false

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore backend dependencies
      run: dotnet restore backend/BigSmile.slnx > /dev/null

    - name: Capture backend compile errors
      run: |
        set +e
        dotnet build backend/BigSmile.slnx --configuration Release --no-restore > backend-build.log 2>&1
        status=$?
        set -e
        if [ "$status" -eq 0 ]; then
          echo "Backend compilation succeeded."
          exit 0
        fi
        mkdir -p diagnostics
        grep -E "error (CS|NETSDK|NU|MSB)[0-9]+|: error " backend-build.log > diagnostics/backend-build-errors.txt || tail -n 100 backend-build.log > diagnostics/backend-build-errors.txt
        cat diagnostics/backend-build-errors.txt
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add diagnostics/backend-build-errors.txt
        git commit -m "chore: capture backend build errors"
        git push origin HEAD:release-7.1/document-upload-hardening
        exit "$status"

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Restore backend dependencies
      run: dotnet restore backend/BigSmile.slnx

    - name: Build backend
      run: dotnet build backend/BigSmile.slnx --configuration Release --no-restore

    - name: Validate architecture
      run: python3 backend/scripts/validate_architecture.py

    - name: Run backend unit tests
      run: dotnet test backend/tests/BigSmile.UnitTests --configuration Release --no-build

    - name: Run backend integration tests
      run: dotnet test backend/tests/BigSmile.IntegrationTests --configuration Release --no-build

    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend

    - name: Build frontend
      run: npm run build
      working-directory: frontend

    - name: Run frontend tests
      run: npm run test -- --watch=false
      working-directory: frontend
