name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Restore backend dependencies
      run: dotnet restore backend/BigSmile.slnx

    - name: Build backend
      run: dotnet build backend/BigSmile.slnx --configuration Release --no-restore

    - name: Validate architecture
      run: python3 backend/scripts/validate_architecture.py

    - name: Run backend unit tests
      run: dotnet test backend/tests/BigSmile.UnitTests --configuration Release --no-build

    - name: Run backend integration tests
      run: dotnet test backend/tests/BigSmile.IntegrationTests --configuration Release --no-build

    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend

    - name: Build frontend
      run: npm run build
      working-directory: frontend

    - name: Run frontend tests
      run: npm run test -- --watch=false
      working-directory: frontend

  finalize_release6_wording:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Release 6 branch
      uses: actions/checkout@v4
      with:
        ref: docs/release-6-billing-audit
        fetch-depth: 1
        show-progress: false

    - name: Apply wording cleanup
      run: python scripts/finalize_release6_wording.py

    - name: Commit wording cleanup
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add \
          "STATE — BigSmile.md" \
          README.md \
          AGENTS.md \
          PROJECT_MAP.md \
          docs/product-roadmap.md \
          docs/ux-redesign-reconciliation-and-plan.md \
          docs/release-6-billing-audit-and-closure.md \
          docs/decisions/009-release-6-billing-document-foundation.md
        git diff --cached --check
        git commit -m "docs: clarify Release 5 and Release 6 boundaries"
        git push origin HEAD:docs/release-6-billing-audit