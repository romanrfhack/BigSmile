name: Reconcile Release 7 closure documentation

on:
  push:
    branches:
      - docs/release-7-closure

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/release-7-closure
          fetch-depth: 0

      - name: Reconcile canonical documentation
        run: python scripts/reconcile_release7_closure_docs.py

      - name: Commit reconciliation and remove temporary automation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/reconcile-release7-closure-docs.yml
          git rm scripts/reconcile_release7_closure_docs.py
          git add \
            "STATE — BigSmile.md" \
            README.md \
            AGENTS.md \
            PROJECT_MAP.md \
            docs/product-roadmap.md \
            docs/ux-redesign-reconciliation-and-plan.md \
            docs/patient-intake-and-portal-plan.md \
            docs/decisions/006-patient-intake-and-portal-foundation.md
          git diff --cached --check
          git commit -m "docs: close Release 7 and accept initial MVP"
          git push origin HEAD:docs/release-7-closure
