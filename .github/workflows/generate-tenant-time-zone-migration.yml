name: Generate tenant time zone migration

on:
  push:
    branches:
      - release-7.2/tenant-time-zone

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: release-7.2/tenant-time-zone
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools and dependencies
        working-directory: backend
        run: |
          dotnet tool restore
          dotnet restore BigSmile.slnx

      - name: Generate EF Core migration
        working-directory: backend
        run: |
          dotnet ef migrations add AddTenantTimeZoneFoundation \
            --project src/BigSmile.Infrastructure \
            --startup-project src/BigSmile.Api \
            --context AppDbContext \
            --output-dir Data/Migrations

      - name: Commit generated migration and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/generate-tenant-time-zone-migration.yml
          git add backend/src/BigSmile.Infrastructure/Data/Migrations
          git diff --cached --check
          git commit -m "db: add tenant time zone foundation"
          git push origin HEAD:release-7.2/tenant-time-zone
